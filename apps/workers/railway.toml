# Railway service config for the Praxisa background workers.

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/workers/Dockerfile"
watchPatterns = [
  "apps/workers/**",
  "apps/api/src/db/schema/**",
  "packages/audit-sdk/**",
  "packages/shared-types/**",
]

[deploy]
region = "eu-west"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
